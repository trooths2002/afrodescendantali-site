<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc"><title id="title">Five accountability tracks after Eric Garner</title><desc id="desc">Original Afrodescendant Ali editorial diagram.</desc><rect width="1200" height="630" fill="#08131d"/><path d="M0 535H1200" stroke="#fedb95" stroke-opacity=".28"/><path d="M70 0V630M1130 0V630" stroke="#fedb95" stroke-opacity=".12"/><text x="72" y="100" fill="#faf9f4" font-family="Georgia,serif" font-size="54">Accountability Is Not One Verdict</text><text x="72" y="145" fill="#fedb95" font-family="Arial,sans-serif" font-size="23" letter-spacing="3">FIVE SYSTEMS • FIVE STANDARDS • ONE PUBLIC RECORD</text><g font-family="Arial,sans-serif"><rect x="80" y="230" width="185" height="205" rx="12" fill="none" stroke="#fedb95" stroke-width="3"/><text x="172" y="275" text-anchor="middle" fill="#fedb95" font-size="18">CRIMINAL</text><text x="172" y="335" text-anchor="middle" fill="#faf9f4" font-size="24">NO CHARGE</text><rect x="298" y="230" width="185" height="205" rx="12" fill="none" stroke="#fedb95" stroke-width="3"/><text x="390" y="275" text-anchor="middle" fill="#fedb95" font-size="18">CIVIL</text><text x="390" y="335" text-anchor="middle" fill="#faf9f4" font-size="24">$5.9M</text><rect x="516" y="230" width="185" height="205" rx="12" fill="none" stroke="#fedb95" stroke-width="3"/><text x="608" y="275" text-anchor="middle" fill="#fedb95" font-size="18">DISCIPLINE</text><text x="608" y="335" text-anchor="middle" fill="#faf9f4" font-size="24">DISMISSAL</text><rect x="734" y="230" width="185" height="205" rx="12" fill="none" stroke="#fedb95" stroke-width="3"/><text x="826" y="275" text-anchor="middle" fill="#fedb95" font-size="18">LEGISLATION</text><text x="826" y="335" text-anchor="middle" fill="#faf9f4" font-size="24">NEW LAW</text><rect x="952" y="230" width="185" height="205" rx="12" fill="none" stroke="#fedb95" stroke-width="3"/><text x="1044" y="275" text-anchor="middle" fill="#fedb95" font-size="18">TRANSPARENCY</text><text x="1044" y="335" text-anchor="middle" fill="#faf9f4" font-size="24">INQUIRY</text></g><path d="M80 485H1137" stroke="#c5c6ca" stroke-width="3"/><text x="80" y="525" fill="#faf9f4" font-family="Arial,sans-serif" font-size="24">Visibility does not automatically produce a complete institutional explanation.</text><text x="72" y="585" fill="#fedb95" font-family="Arial, sans-serif" font-size="20" letter-spacing="4">AFRODESCENDANT ALI • ORIGINAL EDITORIAL DIAGRAM</text></svg>